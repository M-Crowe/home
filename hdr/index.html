<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HDR Vision Mobile</title>
    
    <!-- Material Design 3 核心库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/beercss@3.5.1/dist/cdn/beer.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.5.1/dist/cdn/beer.min.js"></script>
    
    <style>
        :root {
            --primary: #0061a4;
            --surface: #fdfcff;
            --secondary-container: #e1e2ec;
        }

        body {
            background-color: var(--surface);
            padding-bottom: 80px; /* 为底部状态留空 */
        }

        /* 主查看器：移动端自适应高度 */
        .viewer-stage {
            width: 100%;
            height: 50vh; /* 手机端占据一半高度 */
            background-color: #000;
            border-radius: 0 0 24px 24px; /* 顶部平齐，底部大圆角 */
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        @media (min-width: 600px) {
            .viewer-stage {
                height: 65vh;
                border-radius: 32px;
                margin: 16px;
                width: calc(100% - 32px);
            }
        }

        #main-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 移动端横向滚动缩略图 */
        .thumb-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 16px 4px;
            scrollbar-width: none; /* 隐藏滚动条 */
        }
        .thumb-scroll-container::-webkit-scrollbar { display: none; }

        .thumb-card {
            flex: 0 0 140px; /* 固定宽度 */
            cursor: pointer;
            border-radius: 20px;
            background: var(--secondary-container);
            padding: 8px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .thumb-card.active {
            border-color: var(--primary);
            background: #d1e4ff;
        }

        .thumb-card img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
        }

        .thumb-card p {
            margin: 4px 0 0 0;
            font-size: 12px;
            text-align: center;
            font-weight: 600;
        }

        /* 状态指示器：在移动端更小巧 */
        .status-chip {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            font-size: 12px;
        }

        .header-title {
            padding: 16px;
        }
    </style>
</head>
<body class="light">

    <!-- 顶部导航 -->
    <nav class="top transparent">
        <button class="circle transparent"><i>arrow_back</i></button>
        <h6 class="max center-align">HDR 预览</h6>
        <button class="circle transparent" onclick="ui('mode', (document.body.classList.contains('dark') ? 'light' : 'dark'))">
            <i>dark_mode</i>
        </button>
    </nav>

    <main>
        <!-- 主展示区 -->
        <div class="viewer-stage">
            <picture>
                <source id="main-source" srcset="blue_ocean_1024.avif" type="image/avif">
                <img id="main-img" src="blue_ocean_1024.avif">
            </picture>
        </div>

        <!-- 标题区域 -->
        <div class="header-title">
            <h5 id="display-title" class="primary-text">蓝色海洋</h5>
            <p id="display-desc" class="secondary">1024px AVIF HDR 格式</p>
        </div>

        <div class="divider"></div>

        <!-- 缩略图选择（手机端横向滑动，电脑端自动排列） -->
        <div class="padding">
            <label class="margin">切换样片</label>
            <div class="thumb-scroll-container">
                <!-- 卡片 1 -->
                <div class="thumb-card active" id="card1" onclick="updateView('blue_ocean_1024.avif', '蓝色海洋', '1024px AVIF HDR 格式', 'card1')">
                    <img src="blue_ocean_1024.avif">
                    <p>Blue Ocean</p>
                </div>

                <!-- 卡片 2 -->
                <div class="thumb-card" id="card2" onclick="updateView('white.avif', '纯净白光', '测试极端亮度的 HDR 样片', 'card2')">
                    <img src="white.avif">
                    <p>White Glow</p>
                </div>

                <!-- 可以继续添加更多本地图片卡片 -->
            </div>
        </div>
    </main>

    <!-- HDR 状态指示 -->
    <div id="hdr-chip" class="status-chip chip fill error">
        <i id="hdr-icon">error</i>
        <span id="hdr-text">SDR</span>
    </div>

    <script>
        function updateView(url, title, desc, cardId) {
            const img = document.getElementById('main-img');
            const source = document.getElementById('main-source');
            
            img.style.opacity = '0';
            
            setTimeout(() => {
                source.srcset = url;
                img.src = url;
                document.getElementById('display-title').innerText = title;
                document.getElementById('display-desc').innerText = desc;
                img.style.opacity = '1';
                
                // 更新选中状态
                document.querySelectorAll('.thumb-card').forEach(c => c.classList.remove('active'));
                document.getElementById(cardId).classList.add('active');
            }, 250);
        }

        function checkHDR() {
            const chip = document.getElementById('hdr-chip');
            const icon = document.getElementById('hdr-icon');
            const text = document.getElementById('hdr-text');

            if (window.matchMedia('(dynamic-range: high)').matches) {
                chip.classList.replace('error', 'primary');
                icon.innerText = 'high_quality';
                text.innerText = 'HDR 开启';
            } else {
                chip.classList.replace('primary', 'error');
                icon.innerText = 'sd';
                text.innerText = 'SDR 模式';
            }
        }

        window.onload = checkHDR;
    </script>
</body>
</html>
