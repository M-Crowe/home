<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HDR Viewer - 蓝色海洋</title>
    
    <!-- Material Design 3 样式库 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/beercss@3.5.1/dist/cdn/beer.min.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/beercss@3.5.1/dist/cdn/beer.min.js"></script>
    
    <style>
        :root {
            /* MD3 核心色调 */
            --primary: #0061a4;
            --surface: #fdfcff;
        }

        body {
            background-color: var(--surface);
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        /* HDR 增强显示效果 */
        @media (dynamic-range: high) {
            .hdr-container {
                /* 在 HDR 屏幕上增加一点光晕感 */
                box-shadow: 0 0 30px oklch(0.7 0.15 250 / 0.2);
            }
        }

        .viewer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 重点：HDR 图片展示区域 */
        .hdr-viewer {
            width: 100%;
            background-color: #000;
            border-radius: 28px; /* MD3 特色大圆角 */
            overflow: hidden;
            line-height: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .hdr-viewer img {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
        }

        .info-card {
            margin-top: 24px;
            padding: 24px;
            width: 100%;
            border-radius: 20px;
            background: #f0f4f9;
        }

        .status-badge {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10;
        }
    </style>
</head>
<body class="light">

    <!-- 导航栏 -->
    <nav class="top l">
        <button class="circle transparent"><i>photo_library</i></button>
        <h5 class="max">HDR 图像展示</h5>
        <button class="circle transparent" onclick="toggleTheme()">
            <i id="theme-icon">dark_mode</i>
        </button>
    </nav>

    <main class="viewer-container">
        
        <!-- HDR 主图 -->
        <div class="hdr-viewer hdr-container">
            <picture>
                <!-- 引用你的本地文件 -->
                <source srcset="blue_ocean_1024.avif" type="image/avif">
                <img src="blue_ocean_1024.avif.avif" alt="Blue Ocean HDR">
            </picture>
        </div>

        <!-- 文字说明内容 -->
        <div class="info-card">
            <div class="row">
                <div class="max">
                    <h4 class="primary-text">蓝色海洋 (1024)</h4>
                    <p>文件名: <code>blue_ocean_1024.avif</code></p>
                    <p class="secondary">
                        这张图片以 AVIF 格式编码，包含高动态范围 (HDR) 信息。
                        在支持 HDR 的显示器上，天空和水面的高光将呈现出超越 SDR 范围的亮度。
                    </p>
                </div>
            </div>
            
            <div class="space"></div>
            
            <div class="row scroll">
                <div class="chip outline"><i>settings_brightness</i> 10-bit Color</div>
                <div class="chip outline"><i>high_quality</i> AVIF HDR</div>
                <div class="chip outline"><i>Width</i> 1024px</div>
            </div>
        </div>
    </main>

    <!-- HDR 状态检测提示 (MD3 Badge) -->
    <div id="hdr-chip" class="status-badge chip fill error">
        <i id="hdr-icon">error</i>
        <span id="hdr-text">正在检测显示器 HDR 状态...</span>
    </div>

    <script>
        // 检测 HDR 支持
        function detectHDR() {
            const chip = document.getElementById('hdr-chip');
            const icon = document.getElementById('hdr-icon');
            const text = document.getElementById('hdr-text');

            if (window.matchMedia('(dynamic-range: high)').matches) {
                chip.classList.replace('error', 'primary');
                icon.innerText = 'check_circle';
                text.innerText = 'HDR 显示已激活';
            } else {
                chip.classList.replace('primary', 'error');
                icon.innerText = 'info';
                text.innerText = '当前处于 SDR 模式';
            }
        }

        // 主题切换
        function toggleTheme() {
            const isDark = document.body.classList.contains('dark');
            if (isDark) {
                ui('mode', 'light');
                document.getElementById('theme-icon').innerText = 'dark_mode';
            } else {
                ui('mode', 'dark');
                document.getElementById('theme-icon').innerText = 'light_mode';
            }
        }

        window.onload = detectHDR;
    </script>
</body>
</html>
